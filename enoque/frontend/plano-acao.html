<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENOQUE - Plano de Ação</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="bg-effects"></div>

  <main class="content">

    <header class="top-header">
      <div>
        <h1>Plano de Ação da Semana</h1>
        <p class="subtitle">Suas prioridades estratégicas para avançar com clareza.</p>
      </div>
      <a href="dashboard.html" class="header-badge back-btn">VOLTAR</a>
    </header>

    <section class="plan-wrapper">

      <div class="plan-header-card">
        <div class="plan-badge">PLANO ESTRATÉGICO</div>
        <h2>Missões Prioritárias</h2>
        <p>Seu plano semanal foi organizado para gerar avanço real com foco nas áreas mais importantes.</p>
      </div>

      <section id="plano-grid" class="plan-grid">
        <div class="plan-loading-card">
          <div class="loader-ring"></div>
          <p>Carregando missões estratégicas...</p>
        </div>
      </section>

    </section>

  </main>

  <script src="plano-acao.js"></script>
</body>
</html>
