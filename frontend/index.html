<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENOQUE - Acesso</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="style.css">
  <link rel="manifest" href="./manifest.json">

  <meta name="theme-color" content="#00e0ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at top left, rgba(0,224,255,0.08), transparent 35%),
        radial-gradient(circle at bottom right, rgba(0,217,139,0.08), transparent 35%),
        linear-gradient(135deg,#08111f,#0b1728,#050a12);
    color:#ffffff;
    overflow:hidden;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle, rgba(0,224,255,0.08), transparent 65%);
    top:-120px;
    left:-120px;
    animation: floatLight 8s ease-in-out infinite;
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle, rgba(0,217,139,0.08), transparent 65%);
    bottom:-120px;
    right:-120px;
    animation: floatLight 10s ease-in-out infinite reverse;
}

@keyframes floatLight{
    0%,100%{ transform:translateY(0px); }
    50%{ transform:translateY(20px); }
}

.card{
    position:relative;
    width:100%;
    max-width:430px;
    padding:42px 32px;
    border-radius:28px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow:
        0 20px 45px rgba(0,0,0,0.35),
        0 0 25px rgba(0,224,255,0.05);
    animation: cardEntry 1s ease-out;
    z-index:2;
}

@keyframes cardEntry{
    from{
        opacity:0;
        transform:translateY(25px) scale(0.98);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

.card::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:3px;
    border-radius:28px 28px 0 0;
    background:linear-gradient(90deg,#00e0ff,#00d98b);
}

h2{
    text-align:center;
    font-size:2rem;
    margin-bottom:10px;
    color:#ffffff;
    font-weight:700;
    letter-spacing:0.5px;
    text-shadow:0 0 15px rgba(0,224,255,0.18);
}

.brand-sub{
    text-align:center;
    color:#9cc7ff;
    font-size:13px;
    margin-bottom:24px;
    letter-spacing:0.5px;
}

input{
    width:100%;
    padding:15px 16px;
    margin:10px 0;
    border:none;
    border-radius:14px;
    background:rgba(255,255,255,0.05);
    color:#ffffff;
    font-size:15px;
    outline:none;
    border:1px solid rgba(255,255,255,0.08);
    transition:all .3s ease;
}

input::placeholder{
    color:#7fa1c7;
}

input:focus{
    transform:translateY(-1px);
    border:1px solid rgba(0,224,255,0.35);
    box-shadow:
        0 0 0 4px rgba(0,224,255,0.08),
        0 8px 18px rgba(0,224,255,0.08);
}

button{
    width:100%;
    padding:15px;
    margin-top:14px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-size:16px;
    font-weight:700;
    transition:all .3s ease;
}

#main-btn{
    background:linear-gradient(135deg,#00e0ff,#00d98b);
    color:#04111d;
    box-shadow:
        0 10px 24px rgba(0,224,255,0.18);
}

#main-btn:hover{
    transform:translateY(-2px);
    box-shadow:
        0 16px 32px rgba(0,224,255,0.22);
}

#main-btn:active{
    transform:translateY(0);
}

.toggle-btn{
    background:none;
    color:#9cc7ff;
    font-size:14px;
    margin-top:18px;
    font-weight:500;
}

.toggle-btn:hover{
    color:#00e0ff;
}

.msg{
    margin-top:16px;
    text-align:center;
    font-size:14px;
    min-height:20px;
    color:#d7e8ff;
}
</style>
</head>
<body>

<div class="card">
    <h2 id="form-title">Imersão Enoque</h2>
    <div class="brand-sub">Acesso exclusivo à plataforma</div>

    <input type="email" id="email" placeholder="Seu e-mail" required>
    <input type="password" id="password" placeholder="Sua senha" required>

    <button id="main-btn" onclick="handleAuth()">Entrar</button>

    <div id="message" class="msg"></div>

    <center>
        <button class="toggle-btn" id="toggle-link" onclick="toggleMode()">Não tem conta? Cadastre-se</button>
    </center>
</div>

<script>
const SUPABASE_URL = 'https://fzlbhvxneemoramlbysn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_PwZyWTjtge6JDurdfu8h1g_KbvbsDpf';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let isLoginMode = true;

function toggleMode() {
    isLoginMode = !isLoginMode;
    document.getElementById('form-title').innerText = isLoginMode ? 'Imersão Enoque' : 'Criar Conta Enoque';
    document.getElementById('main-btn').innerText = isLoginMode ? 'Entrar' : 'Cadastrar';
    document.getElementById('toggle-link').innerText = isLoginMode ? 'Não tem conta? Cadastre-se' : 'Já tem conta? Faça Login';
    document.getElementById('message').innerText = '';
}

async function handleAuth() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const messageDiv = document.getElementById('message');

    messageDiv.innerText = "Processando...";
    messageDiv.style.color = '#d7e8ff';

    if (isLoginMode) {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
            messageDiv.style.color = '#ff6b6b';
            messageDiv.innerText = error.message;
        } else {
            messageDiv.style.color = '#00d98b';
            messageDiv.innerText = "Login realizado! Entrando...";
            
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 500); 
        }
    } else {
        const { data, error } = await supabaseClient.auth.signUp({ email, password });

        if (error) {
            messageDiv.style.color = '#ff6b6b';
            messageDiv.innerText = error.message;
        } else {
            messageDiv.style.color = '#00d98b';
            messageDiv.innerText = "Sucesso! Verifique seu e-mail para confirmar.";
        }
    }
}
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then(reg => {
        console.log('Service Worker registrado com sucesso:', reg.scope);
      })
      .catch(err => {
        console.log('Erro ao registrar Service Worker:', err);
      });
  });
}
</script>

</body>
</html>
