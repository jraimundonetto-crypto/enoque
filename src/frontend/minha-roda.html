<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENOQUE - Diagnóstico Inteligente</title>
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="bg-effects"></div>
    <main class="content">
        <header class="top-header">
            <div>
                <h1>Consultoria Estratégica</h1>
                <p id="progresso-texto">Carregando perguntas da IA...</p>
            </div>
            <div style="display:flex; gap:10px;">
    <a href="dashboard.html" class="header-badge" style="text-decoration:none;">VOLTAR</a>
    <a href="dashboard.html" class="header-badge" style="text-decoration:none;">CANCELAR</a>
</div>
        </header>

        <section id="questionario-container" class="diagnostic-flow">

            <button id="btn-voltar" onclick="mudarPagina(-1)" class="dock-item" style="display:none;">Anterior</button>
            <button id="btn-proximo" onclick="mudarPagina(1)" class="header-badge" style="border:none; cursor:pointer; display:none;">Próxima Modalidade</button>

    </main>
